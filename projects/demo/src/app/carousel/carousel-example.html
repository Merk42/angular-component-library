<mec-carousel [title]="'Carousel Demo'" [config]="carouselconfig">
  @for (item of slides(); track item.id;) {
    <mec-carousel-content>
      <div class="relative">
        <img [src]="item.src" [alt]="'cat ' + $index"/>
      </div>
    </mec-carousel-content>
  }
</mec-carousel>


<mec-carousel [title]="'Too Few Items'" [config]="carouselconfig">
  @for (item of toofew(); track item.id;) {
    <mec-carousel-content>
      <div class="relative">
        <img [src]="item.src" [alt]="'cat alt ' + $index"/>
      </div>
    </mec-carousel-content>
  }
</mec-carousel>
